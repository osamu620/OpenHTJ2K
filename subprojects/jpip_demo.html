<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenHTJ2K JPIP Foveation Demo</title>
<style>
  body { margin: 0; background: #111; color: #eee; font-family: monospace; }
  #controls { padding: 8px; }
  #controls label { margin-right: 12px; }
  #controls input { width: 360px; }
  canvas { display: block; margin: 8px auto; cursor: crosshair; }
  #stats { padding: 4px 8px; font-size: 13px; }
</style>
</head>
<body>

<div id="controls">
  <label>JPIP Server: <input id="server" value="http://localhost:8080" /></label>
  <button id="connectBtn">Connect</button>
  <span id="info"></span>
  <br>
  <label>Reduce: <select id="reduce">
    <option value="0">0 (full res)</option>
    <option value="1" selected>1 (half res)</option>
    <option value="2">2 (quarter res)</option>
  </select></label>
  <label>Para ratio: <select id="para_ratio">
    <option value="0.5" selected>0.5</option>
    <option value="0.25">0.25</option>
    <option value="0.125">0.125</option>
  </select></label>
  <label>Peri ratio: <select id="peri_ratio">
    <option value="0.25">0.25</option>
    <option value="0.125" selected>0.125</option>
    <option value="0.0625">0.0625</option>
  </select></label>
</div>
<canvas id="canvas"></canvas>
<div id="stats"></div>
<script>
  (function() {
    var p = new URLSearchParams(location.search);
    var s = p.get('server');       if (s) document.getElementById('server').value = s;
    var r = p.get('reduce');       if (r) document.getElementById('reduce').value = r;
    var pr = p.get('para_ratio');  if (pr) document.getElementById('para_ratio').value = pr;
    var pe = p.get('peri_ratio');  if (pe) document.getElementById('peri_ratio').value = pe;
  })();
</script>

<script src="https://unpkg.com/wasm-feature-detect/dist/umd/index.js"></script>
<script>
  if (!window.crossOriginIsolated && window.isSecureContext) {
    navigator.serviceWorker.register("coi-serviceworker.js").then(
      function (reg) {
        if (!window.crossOriginIsolated) {
          reg.addEventListener("updatefound", function () {
            reg.installing.addEventListener("statechange", function () {
              if (this.state === "activated") location.reload();
            });
          });
          if (reg.active && !navigator.serviceWorker.controller) location.reload();
        }
      },
      function (err) { console.warn("COI service worker failed:", err); }
    );
  }
</script>
<script type="module">
// Auto-detect the best WASM variant: multi-threaded SIMD if available,
// otherwise single-threaded SIMD.  ?variant=st forces single-threaded.
const hasSimd = await wasmFeatureDetect.simd();
const hasMt = window.crossOriginIsolated && (typeof SharedArrayBuffer !== 'undefined');
const forceVariant = new URLSearchParams(location.search).get('variant');
const useMt = forceVariant === 'mt' ? true : forceVariant === 'st' ? false : (hasSimd && hasMt);
const wasmFile = useMt ? './libopen_htj2k_jpip_mt_simd.js' : './libopen_htj2k_jpip.js';
const {default: createModule} = await import(wasmFile);

const $ = id => document.getElementById(id);

let M = null;   // WASM module
let ctx = 0;    // jpip context handle (pointer)
let canvasW = 0, canvasH = 0;

function wasmWrite(data, ptr) {
  new Uint8Array(M.HEAPU8.buffer).set(data, ptr);
}
let rgbPtr = 0; // WASM heap pointer for RGBA output
let running = false;
let serverUrl = '';
let busy = false;  // guard against overlapping fetch/decode

// WebGL2 state
let gl = null;
let glTex = null;
let glProgram = null;
let texW = 0, texH = 0;

function initWebGL(canvas, w, h) {
  gl = canvas.getContext('webgl2', { antialias: false, alpha: false });
  if (!gl) { console.warn('WebGL2 unavailable, falling back to Canvas 2D'); return false; }

  const vs = `#version 300 es
    const vec2 pos[4] = vec2[](vec2(-1,-1),vec2(1,-1),vec2(-1,1),vec2(1,1));
    const vec2 uv[4]  = vec2[](vec2(0,1),vec2(1,1),vec2(0,0),vec2(1,0));
    out vec2 vUV;
    void main() { vUV = uv[gl_VertexID]; gl_Position = vec4(pos[gl_VertexID],0,1); }`;
  const fs = `#version 300 es
    precision mediump float;
    uniform sampler2D uTex;
    in vec2 vUV;
    out vec4 fragColor;
    void main() { fragColor = texture(uTex, vUV); }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      console.error(gl.getShaderInfoLog(s));
    return s;
  }
  glProgram = gl.createProgram();
  gl.attachShader(glProgram, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(glProgram, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(glProgram);
  gl.useProgram(glProgram);

  glTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, glTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  texW = w; texH = h;

  gl.bindVertexArray(gl.createVertexArray());
  gl.viewport(0, 0, canvas.width, canvas.height);
  return true;
}

function drawFrame(rgba, w, h) {
  if (!gl) {
    // Canvas 2D fallback
    const c = $('canvas');
    const ctx2d = c.getContext('2d');
    const img = new ImageData(new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength), w, h);
    ctx2d.putImageData(img, 0, 0);
    return;
  }
  gl.bindTexture(gl.TEXTURE_2D, glTex);
  gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, rgba);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

const FOVEA_RATIO = 1.0;
function PARA_RATIO() { return parseFloat($('para_ratio').value) || 0.5; }
function PERI_RATIO() { return parseFloat($('peri_ratio').value) || 0.125; }

async function init() {
  $('info').textContent = 'Loading WASM…';
  try {
    M = await createModule();
    $('info').textContent = `WASM ready (${useMt ? 'MT+SIMD' : 'SIMD'}). Enter server URL and click Connect.`;
  } catch (e) {
    $('info').textContent = 'WASM load failed: ' + e.message;
    console.error('WASM load error:', e);
  }
  $('connectBtn').onclick = connect;
}

function buildQuery(fx, fy, ox, oy, sx, sy) {
  let q = `fsiz=${fx},${fy}`;
  if (ox || oy) q += `&roff=${ox},${oy}`;
  if (sx || sy) q += `&rsiz=${sx},${sy}`;
  q += '&type=jpp-stream';
  return q;
}

async function connect() {
  if (!M) { $('info').textContent = 'WASM not loaded yet'; return; }
  serverUrl = $('server').value.replace(/\/+$/, '');
  $('info').textContent = 'Connecting to ' + serverUrl + '…';

  try {
    // Initial request — fsiz=1,1 gets the main-header data-bin
    // plus minimal precinct data.
    const resp = await fetch(`${serverUrl}/jpip?fsiz=1,1&type=jpp-stream`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf = new Uint8Array(await resp.arrayBuffer());
    $('info').textContent = `Got ${buf.length} bytes, creating context…`;

    // jpip_create_context parses the JPP-stream response internally,
    // extracts the main-header data-bin, and builds the CodestreamIndex.
    const binPtr = M._malloc(buf.length);
    wasmWrite(buf, binPtr);
    ctx = M._jpip_create_context(binPtr, buf.length);
    M._free(binPtr);
  } catch (e) {
    $('info').textContent = `Connect failed: ${e.message}`;
    console.error('connect error:', e);
    return;
  }

  if (!ctx) {
    $('info').textContent = 'Error: failed to build index from server response';
    return;
  }

  canvasW = M._jpip_get_canvas_width(ctx);
  canvasH = M._jpip_get_canvas_height(ctx);
  const totalP = M._jpip_get_total_precincts(ctx);

  // Apply reduce level (Phase 4 Option C — trades resolution for decode speed).
  const reduceN = parseInt($('reduce').value) || 0;
  M._jpip_set_reduce(ctx, reduceN);
  $('reduce').onchange = () => M._jpip_set_reduce(ctx, parseInt($('reduce').value) || 0);

  const c = $('canvas');
  // Use full canvas resolution for the texture — WebGL's GL_LINEAR
  // handles downsampling to the CSS display size.  CSS max-width
  // keeps the on-screen size reasonable.
  c.width = canvasW;
  c.height = canvasH;
  c.style.maxWidth = '1920px';
  c.style.width = '100%';
  c.style.height = 'auto';

  rgbPtr = M._malloc(canvasW * canvasH * 4);
  initWebGL(c, canvasW, canvasH);
  $('info').textContent = `${canvasW}×${canvasH}, ${totalP} precincts` +
      (gl ? ' [WebGL2]' : ' [Canvas 2D]');

  running = true;
  let lastGx = -1, lastGy = -1;
  let frameCount = 0, lastFpsTime = performance.now();

  c.addEventListener('mousemove', async (e) => {
    if (!running || busy) return;
    const rect = c.getBoundingClientRect();
    const gx = Math.round((e.clientX - rect.left) / rect.width * (canvasW - 1));
    const gy = Math.round((e.clientY - rect.top) / rect.height * (canvasH - 1));
    if (gx === lastGx && gy === lastGy) return;
    lastGx = gx; lastGy = gy;

    const foveaR = Math.max(16, Math.round(canvasW / 15));
    const paraR  = Math.max(32, Math.round(canvasW / 8));

    // Build 3 view-window queries.
    const foveaFx = canvasW, foveaFy = canvasH;
    const paraFx = Math.round(canvasW * PARA_RATIO()), paraFy = Math.round(canvasH * PARA_RATIO());
    const periFx = Math.round(canvasW * PERI_RATIO()), periFy = Math.round(canvasH * PERI_RATIO());

    const foveaQ = buildQuery(foveaFx, foveaFy,
        Math.max(0, gx - foveaR), Math.max(0, gy - foveaR), foveaR * 2, foveaR * 2);
    const paraGx = Math.round(gx * PARA_RATIO()), paraGy = Math.round(gy * PARA_RATIO());
    const paraRf = Math.round(paraR * PARA_RATIO());
    const paraQ = buildQuery(paraFx, paraFy,
        Math.max(0, paraGx - paraRf), Math.max(0, paraGy - paraRf), paraRf * 2, paraRf * 2);
    const periQ = buildQuery(periFx, periFy, 0, 0, periFx, periFy);

    busy = true;
    try {
      const t0 = performance.now();
      const [r1, r2, r3] = await Promise.all([
        fetch(`${serverUrl}/jpip?${foveaQ}`).then(r => r.arrayBuffer()),
        fetch(`${serverUrl}/jpip?${paraQ}`).then(r => r.arrayBuffer()),
        fetch(`${serverUrl}/jpip?${periQ}`).then(r => r.arrayBuffer()),
      ]);
      const tFetch = performance.now();

      M._jpip_begin_frame(ctx);
      for (const ab of [r1, r2, r3]) {
        const arr = new Uint8Array(ab);
        const ptr = M._malloc(arr.length);
        wasmWrite(arr, ptr);
        M._jpip_add_response(ctx, ptr, arr.length);
        M._free(ptr);
      }
      const rc = M._jpip_end_frame(ctx, rgbPtr, c.width, c.height);
      const tDecode = performance.now();
      if (rc !== 0) {
        $('stats').textContent = `decode error: ${rc}`;
        return;
      }

      const rgba = new Uint8Array(M.HEAPU8.buffer, rgbPtr, c.width * c.height * 4);
      drawFrame(rgba, c.width, c.height);

      frameCount++;
      const fetchMs = (tFetch - t0).toFixed(0);
      const decodeMs = (tDecode - tFetch).toFixed(0);
      const now = performance.now();
      if (now - lastFpsTime > 1000) {
        const fps = frameCount / ((now - lastFpsTime) / 1000);
        $('stats').textContent = `gaze=(${gx},${gy})  ${fps.toFixed(1)} fps  fetch=${fetchMs}ms  decode=${decodeMs}ms`;
        frameCount = 0;
        lastFpsTime = now;
      }
    } catch (e) {
      $('stats').textContent = `fetch error: ${e.message}`;
      console.error('frame error:', e);
    }
    busy = false;
  });
}

init();
</script>
</body>
</html>
