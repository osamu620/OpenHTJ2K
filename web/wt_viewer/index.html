<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenHTJ2K WebTransport viewer</title>
<style>
  body { font-family: ui-monospace, monospace; margin: 0; background: #111; color: #eee; }
  header { padding: 0.5em 1em; background: #1d1d1d; border-bottom: 1px solid #333; }
  header input { font-family: inherit; padding: 2px 6px; }
  header input.url { width: 26em; }
  header input.hash { width: 60ch; font-size: 90%; }
  header button { padding: 4px 10px; }
  main  { display: flex; flex-direction: column; align-items: center; padding: 1em; }
  canvas { background: #000; max-width: 100%; image-rendering: pixelated; }
  #stats { font-size: 90%; color: #aaa; margin-top: 0.6em; min-height: 1.5em; white-space: pre-wrap; }
  #err   { color: #f99; }
  /* Telemetry overlay — shown when ?debug=1 is set on the URL.  Sits on
     top of the canvas with a translucent background so the live frame is
     still visible behind it. */
  #stage { position: relative; }
  #overlay {
    position: absolute; top: 8px; left: 8px;
    padding: 6px 10px; border-radius: 4px;
    background: rgba(0, 0, 0, 0.55);
    font: 11px/1.35 ui-monospace, monospace;
    color: #ddd; pointer-events: none;
    white-space: pre; user-select: none;
  }
  #overlay.bound  { color: #ffb74d; }
  #overlay.severe { color: #ff7373; }
</style>
</head>
<body>
<header>
  <label>WT URL <input id="url" class="url" value="https://localhost:4433/"></label>
  <label>certHash <input id="hash" class="hash" placeholder="paste from bridge stderr"></label>
  <button id="connect">Connect</button>
  <button id="stop" disabled>Stop</button>
  <span id="conn">idle</span>
</header>
<main>
  <div id="stage">
    <canvas id="cv" width="640" height="360"></canvas>
    <div id="overlay" hidden></div>
  </div>
  <div id="stats">awaiting connection…</div>
  <div id="err"></div>
</main>

<script type="module">
const elURL  = document.getElementById('url');
const elHash = document.getElementById('hash');
const elConn = document.getElementById('conn');
const elStats= document.getElementById('stats');
const elErr  = document.getElementById('err');
const btnGo  = document.getElementById('connect');
const btnStop= document.getElementById('stop');
const cv      = document.getElementById('cv');
const elOver  = document.getElementById('overlay');
// Renderer is chosen lazily inside runViewer() — `?renderer=canvas2d`
// forces the CPU path; default is WebGL2 with shader-side YCbCr→RGB.

const qs = new URLSearchParams(location.search);
if (qs.has('url'))      elURL.value  = qs.get('url');
if (qs.has('certHash')) elHash.value = qs.get('certHash');
if (qs.get('autorun') === '1') setTimeout(() => btnGo.click(), 100);
// ?debug=1 — show the telemetry overlay (decode p50/p95, fps, drops, status).
const DEBUG_OVERLAY = qs.get('debug') === '1';
if (DEBUG_OVERLAY) elOver.hidden = false;
// ?report=N — every N ms POST a progress snapshot to /report.  Lets a shell
// driver verify end-to-end without screen-scraping.
const REPORT_MS = parseInt(qs.get('report') || '0', 10);
let _lastReport = 0;
function maybeReport(snap) {
  if (!REPORT_MS) return;
  const now = performance.now();
  if (now - _lastReport < REPORT_MS) return;
  _lastReport = now;
  fetch('/report', { method: 'POST', headers: { 'content-type': 'application/json' },
                     body: JSON.stringify(snap) }).catch(() => {});
}
window.maybeReport = maybeReport;

// Always emit lifecycle pings + errors (independent of REPORT_MS).
function ping(stage, extra = {}) {
  if (!REPORT_MS) return;
  fetch('/report', { method: 'POST', headers: { 'content-type': 'application/json' },
                     body: JSON.stringify({ stage, ...extra }) }).catch(() => {});
}
window.addEventListener('error',          e => ping('window.error',          { msg: e.message }));
window.addEventListener('unhandledrejection', e => ping('window.unhandledrejection', { msg: String(e.reason) }));
window.ping = ping;

let aborter = null;

// Auto-reconnect: when a WebTransport session ends due to a producer
// reboot, network blip, or transient bridge restart, the viewer
// transparently retries with capped exponential back-off (1, 2, 4, 8,
// 16, 30, 30, … seconds).  A session that lasted longer than RESET_AFTER_MS
// resets the back-off counter; consecutive immediate failures (cert
// rejection, bad URL) progressively delay the next attempt.  The Stop
// button cleanly cancels the loop.  Disable with ?reconnect=0.
const RECONNECT      = qs.get('reconnect') !== '0';
const MAX_BACKOFF_MS = 30000;
const RESET_AFTER_MS = 10000;
const FATAL_PATTERN  = /WebTransport not supported/;   // don't bother retrying these

btnGo.addEventListener('click', async () => {
  btnGo.disabled = true; btnStop.disabled = false; elErr.textContent = '';
  let attempt = 0;
  while (true) {
    aborter = new AbortController();
    const sessionStart = performance.now();
    let aborted = false;
    let lastError = null;
    try {
      elConn.textContent = attempt === 0 ? 'connecting…' : `reconnect attempt ${attempt}…`;
      await runViewer(elURL.value.trim(), elHash.value.trim(), aborter.signal);
      if (aborter.signal.aborted) aborted = true;
    } catch (e) {
      lastError = e;
      if (aborter.signal.aborted) aborted = true;
    }

    // Stop conditions: user clicked Stop, reconnect disabled, or the
    // error is something we know retrying won't fix.
    if (aborted || !RECONNECT ||
        (lastError && FATAL_PATTERN.test(String(lastError)))) {
      if (lastError) {
        elErr.textContent = lastError.stack || String(lastError);
        elConn.textContent = 'error';
      } else {
        elConn.textContent = aborted ? 'stopped' : 'closed';
      }
      break;
    }

    // Surface the failure but keep retrying.
    if (lastError) {
      elErr.textContent = `(reconnecting) ${String(lastError).slice(0, 200)}`;
      ping('reconnect.error', { msg: String(lastError), attempt });
    }

    // A long-lived session means whatever just failed is transient —
    // reset back-off so the next blip retries quickly.
    const sessionMs = performance.now() - sessionStart;
    if (sessionMs > RESET_AFTER_MS) attempt = 0;

    attempt++;
    const backoff = Math.min(MAX_BACKOFF_MS, 1000 * 2 ** Math.min(attempt - 1, 5));
    elConn.textContent = `reconnecting in ${Math.round(backoff / 1000)}s…`;
    ping('reconnect.scheduled', { attempt, backoff });

    // Sleep, but cancellable by the Stop button.
    await new Promise(resolve => {
      const t = setTimeout(resolve, backoff);
      aborter.signal.addEventListener('abort', () => { clearTimeout(t); resolve(); });
    });
    if (aborter.signal.aborted) {
      elConn.textContent = 'stopped';
      break;
    }
  }
  btnGo.disabled = false; btnStop.disabled = true; aborter = null;
});
btnStop.addEventListener('click', () => aborter?.abort('user stop'));

// Convert a colon-separated hex string to a Uint8Array, for serverCertificateHashes.
function hexToBytes(s) {
  const parts = s.split(/[:\s]+/).filter(Boolean);
  if (parts.length !== 32) throw new Error(`certHash needs 32 bytes, got ${parts.length}`);
  return new Uint8Array(parts.map(p => parseInt(p, 16)));
}

import { DecoderClient } from '/shared/decoder_client.mjs';

// ?threads=N — number of WASM decoder workers used inside the worker.
// Defaults to 4 (Phase A0 showed 4-thread mt_simd handles FHD@30 at
// ~55 fps and 4K@30 at ~17 fps, both better than 2-thread).
const THREAD_COUNT = parseInt(qs.get('threads') || '4', 10);
// ?source_fps=N — declared source frame rate; used to flag "decode-bound"
// when rolling p95 decode is above the inter-frame interval.  No
// functional effect on the decode path.
const SOURCE_FPS = parseFloat(qs.get('source_fps') || '30');
// ?renderer=canvas2d forces the CPU path.  Default = webgl2 with
// shader-side YCbCr→RGB; falls back to canvas2d if WebGL2 isn't available.
const WANT_RENDERER = qs.get('renderer') || 'webgl2';
const PACKET_BUF = 4096;

async function runViewer(url, hash, signal) {
  // 1. Open the WebTransport session.
  if (!('WebTransport' in window)) throw new Error('WebTransport not supported in this browser');
  const opts = {};
  if (hash) opts.serverCertificateHashes = [{ algorithm: 'sha-256', value: hexToBytes(hash) }];
  ping('wt.opening', { url, hash_len: hash.length });
  const wt = new WebTransport(url, opts);
  signal.addEventListener('abort', () => wt.close());
  await wt.ready;
  ping('wt.ready');
  elConn.textContent = 'open — initialising renderer';

  // 2. Pick the renderer.  WebGL2 wants planar Y/Cb/Cr from the worker;
  // Canvas2D wants RGBA already-matrixed (cheaper to apply matrix in WASM
  // than in JS on the main thread).
  const renderer = makeRenderer(WANT_RENDERER, cv);
  const drawCanvas = renderer._replacementCanvas || cv;
  ping('renderer.ready', { kind: renderer.kind });
  const wantOutput = renderer.kind === 'webgl2' ? 'planar' : 'rgba';

  // 3. Per-frame state shared between the worker callback and the rAF
  // loop.  `pendingFrame` is the latest decoded frame waiting to draw;
  // `framePending` flags the rAF tick that something changed.
  const decode_p95 = new RollingP95(60);
  let decodedFrames = 0;
  let pendingFrame  = null;       // { mode, w, h, ... } from the worker
  let framePending  = false;
  let lastW = 0, lastH = 0;
  let lastStats = { framesEmitted: 0, framesDropped: 0, seqGaps: 0 };
  let lastStatsTickMs = performance.now();

  // RTP-clock vs wall-clock drift tracker.  Anchored on the first decoded
  // frame: drift_ms = (now - wallAnchor) - (rtpTs - rtpAnchor) / 90.
  let rtpAnchor = null, wallAnchor = null, lastDrift = 0;
  function noteRtpFrame(rtpTs) {
    if (rtpAnchor === null) { rtpAnchor = rtpTs >>> 0; wallAnchor = performance.now(); return; }
    const dRtp = ((rtpTs - rtpAnchor) | 0) >>> 0;
    lastDrift = (performance.now() - wallAnchor) - dRtp / 90;
  }

  // 4. Spin up the decoder worker.
  ping('worker.starting');
  const dec = new DecoderClient({
    wasmBase:    '/wasm/',
    threadCount: THREAD_COUNT,
    output:      wantOutput,
    onFrame: (frame) => {
      // The worker already applied drop-on-overrun against its WASM
      // ready-queue.  On main we just need to keep the LATEST frame as
      // the next one to draw — if we're behind vsync, older frames in
      // flight are simply replaced (the GC reclaims their buffers).
      pendingFrame = frame;
      framePending = true;
      decode_p95.push(frame.decodeMs);
      decodedFrames++;
      if (decodedFrames === 1) ping('first.frame.complete', { w: frame.w, h: frame.h });
      noteRtpFrame(frame.rtpTs);
    },
    onStats: (s) => { lastStats = s; },
    onError: (e) => {
      ping('worker.error', { msg: e.msg, fatal: !!e.fatal });
      if (e.fatal) elErr.textContent = `worker: ${String(e.msg).slice(0, 200)}`;
    },
  });
  await dec.ready;
  ping('worker.ready');
  signal.addEventListener('abort', () => dec.close());

  // 5. rAF render loop.  Decoupled from packet ingest and decode — locks
  // display to monitor refresh and absorbs per-frame jitter.
  let rafHandle = 0;
  function rafTick() {
    if (signal.aborted) { rafHandle = 0; return; }
    if (framePending && pendingFrame) {
      framePending = false;
      const f = pendingFrame;
      if (f.w !== lastW || f.h !== lastH) {
        drawCanvas.width = f.w; drawCanvas.height = f.h;
        renderer.resize(f.w, f.h);
        lastW = f.w; lastH = f.h;
      }
      if (f.mode === 'rgba') {
        renderer.uploadRGBA(new Uint8Array(f.rgba), f.w, f.h);
      } else {
        renderer.uploadYCbCr({
          y:  new Uint8Array(f.y),  cb: new Uint8Array(f.cb),  cr: new Uint8Array(f.cr),
          w:  f.w,  h:  f.h,  cw: f.cw, ch: f.ch,
          matrix: f.matrix, range: f.range,
          mode:  f.colorspace === 16 ? 'rgb' : 'ycbcr',  // ENUMCS_SRGB
        });
      }
      renderer.draw();
      noteFrame();
    }
    rafHandle = requestAnimationFrame(rafTick);
  }
  rafHandle = requestAnimationFrame(rafTick);

  // Rolling display-rate sampler — counts vsync-aligned paints in the
  // last ~1 s window.  This is the FPS users actually see.
  const recentFrameTimes = [];
  function noteFrame() {
    const t = performance.now();
    recentFrameTimes.push(t);
    while (recentFrameTimes.length && t - recentFrameTimes[0] > 1000) recentFrameTimes.shift();
  }

  function tickStats() {
    const now = performance.now();
    if (now - lastStatsTickMs <= 500) return;
    lastStatsTickMs = now;
    const fE = lastStats.framesEmitted;
    const fD = lastStats.framesDropped;
    const sg = lastStats.seqGaps;
    const dp = decode_p95.read();
    const fps = recentFrameTimes.length;
    const frameInterval = 1000 / SOURCE_FPS;
    const decodeBound = dp.p95 > frameInterval;
    const dropPct = fE > 0 ? Math.round(100 * (fE - decodedFrames) / fE) : 0;
    const status = decodeBound
      ? `DECODE-BOUND, ${dropPct}% dropped`
      : (dropPct > 0 ? `${dropPct}% dropped` : 'ok');
    const headline = `${lastW}x${lastH} @ ${fps.toFixed(0)} fps | decode p50/p95 ${dp.p50.toFixed(1)}/${dp.p95.toFixed(1)} ms | ${status}`;
    const driftLabel = `drift ${lastDrift >= 0 ? '+' : ''}${lastDrift.toFixed(0)} ms`;
    const breakdown = `decoded ${decodedFrames} | reassembled ${fE} | reassembly drops ${fD} | seq gaps ${sg} | ${driftLabel}`;
    elStats.textContent = headline + '\n' + breakdown;
    if (DEBUG_OVERLAY) {
      elOver.textContent = headline + '\n' + breakdown;
      elOver.classList.toggle('bound',  decodeBound && dropPct < 30);
      elOver.classList.toggle('severe', decodeBound && dropPct >= 30);
    }
    maybeReport({
      decodedFrames, fE, fD, sg,
      p50: dp.p50, p95: dp.p95, fps, decodeBound, dropPct,
      drift: Math.round(lastDrift),
      w: lastW, h: lastH,
    });
  }

  // 6. Drain the bridge's first incoming unidirectional stream.  Format:
  // [len:u16BE][packet bytes]…  We push raw bytes into the worker; reassembly
  // and decode happen there.  Streams (not datagrams) because Chromium's
  // negotiated WebTransport datagram cap (~1170 B) is below typical RFC 9828
  // packet sizes.
  ping('reader.starting');
  const inUni = wt.incomingUnidirectionalStreams.getReader();
  const { value: stream, done: noStream } = await inUni.read();
  if (noStream) throw new Error('bridge closed before opening a stream');
  ping('stream.opened');
  const reader = stream.getReader();

  // Streaming length-prefix parser.
  let stash = new Uint8Array(0);
  function appendStash(chunk) {
    if (!chunk || !chunk.length) return;
    if (stash.length === 0) { stash = chunk; return; }
    const merged = new Uint8Array(stash.length + chunk.length);
    merged.set(stash, 0); merged.set(chunk, stash.length);
    stash = merged;
  }
  function takeStash(n) {
    const out = new Uint8Array(stash.buffer, stash.byteOffset, n);
    stash = stash.subarray(n);
    return out;
  }

  let packetCount = 0;
  let exitReason = 'abort';
  try {
    while (true) {
      if (signal.aborted) break;
      while (stash.length < 2) {
        const { value, done } = await reader.read();
        if (done) { exitReason = 'eof-header'; return; }
        appendStash(value);
      }
      const len = (stash[0] << 8) | stash[1];
      while (stash.length < 2 + len) {
        const { value, done } = await reader.read();
        if (done) { exitReason = 'eof-body'; return; }
        appendStash(value);
      }
      takeStash(2);
      const pkt = takeStash(len);
      if (++packetCount === 1) ping('first.packet', { len });
      if (len > PACKET_BUF) { console.warn(`oversized packet ${len}`); continue; }
      // Copy out of the stash buffer — pushPacket may transfer the
      // underlying ArrayBuffer to the worker.
      const owned = new Uint8Array(len);
      owned.set(pkt);
      dec.pushPacket(owned);
      tickStats();
    }
  } finally {
    ping('reader.done', { packetCount, decodedFrames, reason: exitReason });
    if (rafHandle) { cancelAnimationFrame(rafHandle); rafHandle = 0; }
    dec.close();
  }
}

// Tiny rolling p50/p95 for the stats overlay — a sorted-array model would
// be simpler but hammering sort() per frame at 60 fps shows up.  This uses
// a circular buffer of recent samples and re-sorts only when read().
class RollingP95 {
  constructor(n) { this.n = n; this.buf = []; this.i = 0; }
  push(v) { if (this.buf.length < this.n) this.buf.push(v); else this.buf[this.i] = v;
            this.i = (this.i + 1) % this.n; }
  read() {
    if (!this.buf.length) return { p50: 0, p95: 0 };
    const s = this.buf.slice().sort((a, b) => a - b);
    return { p50: s[Math.floor(s.length * 0.5)], p95: s[Math.floor(s.length * 0.95)] };
  }
}

// ── Renderers ───────────────────────────────────────────────────────────────
// Two implementations: a WebGL2 renderer that uploads three R8 textures
// (Y/Cb/Cr) and runs the H.273 matrix in the fragment shader, and a
// Canvas2D fallback that takes RGBA bytes (matrix already applied in WASM)
// and blits via putImageData.  The GL path skips a CPU YCbCr→RGB pass
// and lets the GPU do free bilinear chroma upsampling.
//
// Both renderers consume typed arrays passed in by the caller; they no
// longer hold any reference to the WASM heap (the decoder lives in a
// Worker now).

function makeRenderer(kind, canvas) {
  if (kind !== 'canvas2d') {
    // Probe WebGL2 availability on a throwaway canvas so a failed init doesn't
    // claim the real canvas's context type (which would prevent getContext('2d')
    // from succeeding on the same element later).
    let probeOK = false;
    try {
      const probe = document.createElement('canvas');
      probeOK = !!probe.getContext('webgl2');
    } catch (_) {}
    if (probeOK) {
      try {
        return new GL2Renderer(canvas);
      } catch (e) {
        console.warn('GL2Renderer init failed, falling back to canvas2d:', e);
        // The canvas is now poisoned (webgl2-bound).  Replace it with a fresh
        // node so the Canvas2DRenderer can call getContext('2d').
        const replacement = canvas.cloneNode(false);
        canvas.parentNode.replaceChild(replacement, canvas);
        const r = new Canvas2DRenderer(replacement);
        // Forward the new canvas back to runViewer via a side-channel; sizing
        // calls in the decode loop dereference `cv` from the closure.
        r._replacementCanvas = replacement;
        return r;
      }
    }
  }
  return new Canvas2DRenderer(canvas);
}

class Canvas2DRenderer {
  constructor(canvas) {
    this.kind = 'canvas2d';
    this.ctx  = canvas.getContext('2d', { alpha: false });
    if (!this.ctx) {
      // Diagnose poisoned canvas (already bound to a different context type).
      const types = ['2d', 'webgl', 'webgl2', 'bitmaprenderer'];
      const tried = types.map(t => `${t}=${!!canvas.getContext(t)}`).join(',');
      throw new Error(`Canvas2DRenderer: getContext('2d') returned null (${tried})`);
    }
    this.w = 0; this.h = 0; this.imageData = null;
  }
  resize(w, h) { this.imageData = this.ctx.createImageData(w, h); this.w = w; this.h = h; }
  uploadYCbCr() { /* unused — caller selects the RGBA path when kind==='canvas2d' */ }
  uploadRGBA(rgbaU8 /* Uint8Array, length w*h*4 */) {
    this.imageData.data.set(rgbaU8);
  }
  draw() { this.ctx.putImageData(this.imageData, 0, 0); }
}

// Matrix coefficients for H.273 MatrixCoefficients values used by RFC 9828
// senders.  Full-range and narrow-range pairs.  Mirrored from
// source/apps/rtp_recv/ycbcr_rgb.hpp.
const YCBCR_COEFFS = {
  // [cr_to_r, cb_to_g, cr_to_g, cb_to_b]
  bt709_full:   [1.5748, 0.1873,   0.4681,   1.8556],
  bt709_narrow: [1.5748, 0.1873,   0.4681,   1.8556],   // matrix same; range scaling differs
  bt601_full:   [1.402,  0.344136, 0.714136, 1.772],
  bt601_narrow: [1.596,  0.391,    0.813,    2.017],
};

class GL2Renderer {
  constructor(canvas) {
    const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, premultipliedAlpha: false });
    if (!gl) throw new Error('WebGL2 not available');
    this.kind = 'webgl2';
    this.gl   = gl;
    this.tw = 0; this.th = 0; this.tcw = 0; this.tch = 0;

    const vs = `#version 300 es
      out vec2 vTex;
      void main() {
        // Full-screen triangle — no buffers needed; fed by gl_VertexID.
        // Explicit float() casts required: GLSL ES forbids int*float without a cast.
        float bx = float(gl_VertexID & 1);
        float by = float((gl_VertexID >> 1) & 1);
        vec2 p = vec2(bx * 4.0 - 1.0, by * 4.0 - 1.0);
        gl_Position = vec4(p, 0.0, 1.0);
        // Flip V so canvas pixel (0,0) is at the top-left.
        vTex = vec2((p.x + 1.0) * 0.5, 1.0 - (p.y + 1.0) * 0.5);
      }`;
    const fs = `#version 300 es
      precision highp float;
      in  vec2 vTex;
      out vec4 fragColor;
      uniform sampler2D uY, uCb, uCr;
      uniform mat3 uM;          // YCbCr (centered, normalized) → RGB
      uniform vec3 uBias;       // subtract before matrix (Y bias, Cb bias, Cr bias)
      uniform vec3 uScale;      // multiply after bias (range correction)
      void main() {
        vec3 ycc = vec3(
          texture(uY,  vTex).r,
          texture(uCb, vTex).r,
          texture(uCr, vTex).r);
        vec3 rgb = uM * ((ycc - uBias) * uScale);
        fragColor = vec4(clamp(rgb, 0.0, 1.0), 1.0);
      }`;
    this.prog = linkProgram(gl, vs, fs);
    this.uY      = gl.getUniformLocation(this.prog, 'uY');
    this.uCb     = gl.getUniformLocation(this.prog, 'uCb');
    this.uCr     = gl.getUniformLocation(this.prog, 'uCr');
    this.uM      = gl.getUniformLocation(this.prog, 'uM');
    this.uBias   = gl.getUniformLocation(this.prog, 'uBias');
    this.uScale  = gl.getUniformLocation(this.prog, 'uScale');

    this.texY  = makeR8Texture(gl);
    this.texCb = makeR8Texture(gl);
    this.texCr = makeR8Texture(gl);
    // Empty VAO — required by core-profile WebGL2 even for attribute-less draws.
    this.vao = gl.createVertexArray();
    // Sensible defaults: BT.709 full-range identity, so a draw() before any
    // uploadYCbCr() doesn't crash on undefined uniforms.  An upload always
    // overwrites these before the next draw on the live path.
    const c = YCBCR_COEFFS.bt709_full;
    this.matrix = new Float32Array([1.0, 1.0, 1.0,  0.0, -c[1], c[3],  c[0], -c[2], 0.0]);
    this.bias   = new Float32Array([0, 128/255, 128/255]);
    this.scale  = new Float32Array([1, 1, 1]);
  }

  resize(w, h) {
    // Canvas size is set by the caller.  No-op here; texture reallocation is
    // done in upload when (cw,ch) changes.
  }

  uploadYCbCr({ y, cb, cr, w, h, cw, ch, matrix, range, mode }) {
    const gl = this.gl;
    // RGB mode: all three components are luma-sized planes (R/G/B post-MCT).
    // Override the chroma dims so the textures are reallocated to match.
    if (mode === 'rgb') { cw = w; ch = h; }

    // (Re)allocate textures only when dimensions change.
    if (w !== this.tw || h !== this.th) {
      gl.bindTexture(gl.TEXTURE_2D, this.texY);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, w, h, 0, gl.RED, gl.UNSIGNED_BYTE, null);
      this.tw = w; this.th = h;
    }
    if (cw !== this.tcw || ch !== this.tch) {
      gl.bindTexture(gl.TEXTURE_2D, this.texCb);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, cw, ch, 0, gl.RED, gl.UNSIGNED_BYTE, null);
      gl.bindTexture(gl.TEXTURE_2D, this.texCr);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, cw, ch, 0, gl.RED, gl.UNSIGNED_BYTE, null);
      this.tcw = cw; this.tch = ch;
    }
    // Upload the three planes.  texSubImage2D copies; the source views can
    // be discarded after this call returns.
    gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
    gl.bindTexture(gl.TEXTURE_2D, this.texY);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, w,  h,  gl.RED, gl.UNSIGNED_BYTE, y);
    gl.bindTexture(gl.TEXTURE_2D, this.texCb);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, cw, ch, gl.RED, gl.UNSIGNED_BYTE, cb);
    gl.bindTexture(gl.TEXTURE_2D, this.texCr);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, cw, ch, gl.RED, gl.UNSIGNED_BYTE, cr);

    if (mode === 'rgb') {
      // Identity matrix; sampler reads R/G/B directly from the three planes.
      this.matrix = new Float32Array([1,0,0, 0,1,0, 0,0,1]);
      this.bias   = new Float32Array([0, 0, 0]);
      this.scale  = new Float32Array([1, 1, 1]);
      return;
    }

    // YCbCr path: pick coefficients + bias/scale.  matrix=1 → BT.709,
    // 5/6 → BT.601; 0 (identity) and 2/255 (unspecified) fall through to
    // BT.601 as a safe sYCC default — the choice rpicam-apps and most
    // RFC 9828 producers default to.
    const isBT709 = matrix === 1;
    const narrow  = range === 0;
    const c = narrow
      ? (isBT709 ? YCBCR_COEFFS.bt709_narrow : YCBCR_COEFFS.bt601_narrow)
      : (isBT709 ? YCBCR_COEFFS.bt709_full   : YCBCR_COEFFS.bt601_full);

    // YCbCr→RGB column-major (mat3 is column-major in WebGL):
    //   R = 1*Y + 0*Cb + cr_to_r*Cr
    //   G = 1*Y - cb_to_g*Cb - cr_to_g*Cr
    //   B = 1*Y + cb_to_b*Cb + 0*Cr
    this.matrix = new Float32Array([
      1.0, 1.0, 1.0,
      0.0, -c[1], c[3],
      c[0], -c[2], 0.0,
    ]);
    // Narrow: Y maps [16/255, 235/255] → [0,1], Cb/Cr [16/255, 240/255] → [-0.5,0.5]
    // Full:   Y unchanged, chroma centered at 128/255 = 0.5.
    this.bias  = narrow ? new Float32Array([16/255, 128/255, 128/255])
                        : new Float32Array([0,      128/255, 128/255]);
    this.scale = narrow ? new Float32Array([255/219, 255/224, 255/224])
                        : new Float32Array([1, 1, 1]);
  }

  uploadRGBA() { /* unused — runViewer takes the YCbCr path when kind==='webgl2' */ }

  draw() {
    const gl = this.gl;
    gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
    gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(this.prog);
    gl.bindVertexArray(this.vao);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.texY);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, this.texCb);
    gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, this.texCr);
    gl.uniform1i(this.uY, 0); gl.uniform1i(this.uCb, 1); gl.uniform1i(this.uCr, 2);
    gl.uniformMatrix3fv(this.uM, false, this.matrix);
    gl.uniform3fv(this.uBias,  this.bias);
    gl.uniform3fv(this.uScale, this.scale);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
}

function makeR8Texture(gl) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  // LINEAR on chroma → free bilinear upsampling for 4:2:0 / 4:2:2.
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}

function linkProgram(gl, vsSrc, fsSrc) {
  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      throw new Error('shader compile: ' + gl.getShaderInfoLog(sh));
    }
    return sh;
  }
  const vs = compile(gl.VERTEX_SHADER,   vsSrc);
  const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
  const p  = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    throw new Error('program link: ' + gl.getProgramInfoLog(p));
  }
  return p;
}
