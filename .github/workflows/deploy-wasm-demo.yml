# .github/workflows/deploy-wasm-demo.yml
# Builds the Emscripten/WASM demo bundle and deploys it to Cloudflare Pages.
# Runs on push to the listed branches when the WASM inputs change, and can
# also be triggered manually via Actions → Run workflow.
name: Deploy WASM demo

on:
  push:
    branches: [main, feat/wasm-rtp-demo]
    paths:
      - 'web/**'
      - 'source/**'
      - 'functions/**'
      - 'CMakeLists.txt'
      - '.github/workflows/deploy-wasm-demo.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cloudflare's wrangler CLI now requires Node 22+; the runner's default
      # Node is still 20.x, which made `npm install -g wrangler@latest`
      # succeed but `wrangler pages deploy` fail with "requires at least
      # Node.js v22.0.0".  Pin Node 22 so the deploy step stays green even
      # as wrangler bumps its minimum.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61
          actions-cache-folder: emsdk-cache

      - name: Build WASM
        run: |
          cd web
          mkdir -p build && cd build
          emcmake cmake ..
          cmake --build . -j

      - name: Stage deploy dir
        run: |
          mkdir -p deploy
          cp web/build/html/libopen_htj2k*.js   deploy/
          cp web/build/html/libopen_htj2k*.wasm deploy/
          cp web/index.html                     deploy/
          cp web/rtp_demo.html                  deploy/
          cp web/jpip_demo.html                 deploy/
          cp web/jpip_viewer.html                deploy/
          cp web/rtp_parser.js                  deploy/
          cp web/coi-serviceworker.js           deploy/
          # Shared decoder Web Worker — rtp_demo loads this via
          # /shared/decoder_client.mjs which in turn instantiates
          # /shared/decoder_worker.mjs with wasmBase=./ pointing at the flat
          # deploy root.
          cp -r web/shared                      deploy/shared
          # Sample codestreams referenced by index.html's preset dropdown.
          # Only the files the UI actually lists are copied — adjust this
          # list if you add/remove presets.
          for f in \
              ds0_ht_03_b14.j2k ds0_ht_04_b12.j2k ds0_ht_07_b16.j2k \
              ds1_ht_04_b9.j2k  ds1_ht_05_b11.j2k hifi_ht1_02.j2k \
              kodim23_mono.j2c  u04_small.j2c \
              u10_part1_lossless.j2c u10_part15_lossless.j2c; do
            cp "conformance_data/$f" deploy/
          done
          # Cloudflare Pages _headers file: sets the cross-origin isolation
          # headers required for SharedArrayBuffer (multi-threaded WASM).
          # Obsoletes the coi-serviceworker hack for users hitting the
          # deployed URL; SW stays as a fallback for file:// / local dev.
          cat > deploy/_headers <<'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: credentialless
            Cross-Origin-Resource-Policy: same-origin
          EOF
          echo "Deploy directory contents:"
          ls -lh deploy/

      # Deploy with the official wrangler CLI.  (Kept over the older
      # cloudflare/pages-action@v1 because wrangler is the modern path
      # and more actively maintained.)
      - name: Install wrangler
        run: npm install --global wrangler@latest

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy deploy \
            --project-name=htj2k-demo \
            --commit-hash="${{ github.sha }}" \
            --commit-dirty=true \
            --branch=main
